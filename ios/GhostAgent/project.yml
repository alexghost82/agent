name: GhostAgent

options:
  bundleIdPrefix: com.ghost.agent
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.15.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    OTHER_LDFLAGS: "$(inherited) -ObjC"

targets:
  GhostAgent:
    type: application
    platform: iOS
    sources:
      - path: GhostAgent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghostagnt.ghost
        INFOPLIST_FILE: GhostAgent/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth

  GhostAgentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GhostAgentTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GhostAgent

  GhostAgentUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GhostAgentUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GhostAgent
