name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Typecheck Next.js
        run: npm run typecheck
      - name: Lint frontend
        # Next 16 removed `next lint`; linting is the ESLint CLI driven by the
        # root flat config (eslint.config.mjs). This is a MANDATORY gate: any
        # ESLint error fails the build. Stylistic findings are configured as
        # warnings in the flat config and do not fail CI.
        run: npx --no-install eslint .
      - name: Frontend tests (Vitest + RTL)
        # Runs the app/** unit/component tests added by the Frontend mission.
        # Skips automatically if the script is not present so unrelated work is
        # never blocked during rollout.
        run: |
          if npm run | grep -q '^  test:web'; then
            npm run test:web
          else
            echo "::warning title=Frontend tests pending::No 'test:web' script found; skipping."
          fi
      - name: Install functions deps
        run: cd functions && npm install
      - name: Build functions
        run: cd functions && npm run build
      - name: Test functions (unit; integration suites self-skip without the emulator)
        run: cd functions && npm test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set up Java (required by the Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install functions deps
        run: cd functions && npm install
      - name: Install emulator + coverage tooling (not persisted to package.json)
        run: cd functions && npm install --no-save firebase-tools@13 @vitest/coverage-v8@2.1.9
      - name: Integration tests + coverage gate (Firestore emulator)
        env:
          # AES master secret so the PAT/keys encryption paths exercise end to end.
          KEYS_ENC_SECRET: ci-test-master-secret-not-a-real-key
        run: |
          cd functions
          npx firebase emulators:exec --only firestore --project demo-ghost \
            "npx vitest run \
              --coverage \
              --coverage.provider=v8 \
              --coverage.reporter=text \
              --coverage.reporter=lcov \
              --coverage.include='src/**' \
              --coverage.exclude='src/index.ts' \
              --coverage.thresholds.lines=85 \
              --coverage.thresholds.statements=85 \
              --coverage.thresholds.functions=85 \
              --coverage.thresholds.branches=75"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for committed secrets
        run: |
          set -e
          # Fail the build if obvious secrets are committed. Example/template files are excluded.
          PATTERN='(sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----)'
          if grep -RInaE "$PATTERN" \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude='*.example' \
              --exclude='*.lock' \
              --exclude='package-lock.json' \
              .; then
            echo "::error::Potential secret found in repository"
            exit 1
          fi
          echo "No secrets detected."

  commit-lint:
    # Enforces Conventional Commits on every commit message. This is a MANDATORY
    # gate: any non-conventional commit message fails the build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can lint the whole PR/push commit range.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Validate PR commit messages
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune origin "${{ github.base_ref }}"
          npx --no-install commitlint \
            --from "origin/${{ github.base_ref }}" \
            --to "HEAD" \
            --verbose
      - name: Validate pushed commit messages
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # New branch (no "before" ref): validate at least the tip commit.
            npx --no-install commitlint --last --verbose
          else
            npx --no-install commitlint \
              --from "$BEFORE" \
              --to "${{ github.event.after }}" \
              --verbose
          fi
